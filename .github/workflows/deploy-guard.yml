name: deploy-guard

# Runs after every push to main. Polls Vercel for the production deployment to settle,
# then runs the Playwright smoke spec against the live URL. If the smoke spec fails,
# rolls production back to the previous deployment via the Vercel API.
#
# Required GitHub Actions secrets (set in repo Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN  - personal token with rollback permission on the aeclogix-website project
#                   (create at https://vercel.com/account/tokens)
#
# Vercel project IDs are hardcoded below — they are public identifiers (not secrets) and
# the canonical source (.vercel/project.json) is git-ignored, so hardcoding here is the
# cleanest way to keep the workflow self-contained.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      disable_rollback:
        description: 'Skip auto-rollback even if smoke fails (for debugging)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      PROJECT_ID: prj_vmNoRkMjwm8wyEBeW98STvitnZsc
      ORG_ID: team_yVsBSekKmiV5MW40F7KU3RxZ
      # Auto-rollback is ON for push-triggered runs. To skip rollback for a manual run
      # (e.g. when debugging a failure and you want to inspect the live deploy), trigger
      # via Actions tab → deploy-guard → Run workflow → check "disable_rollback".
      DISABLE_ROLLBACK: ${{ github.event.inputs.disable_rollback || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel production deployment to settle
        id: wait_vercel
        run: |
          set -euo pipefail
          # Poll the Vercel API for the latest production deployment matching this commit SHA.
          # Give it up to 6 minutes — Vercel builds for this static site are typically <60s.
          deadline=$(( $(date +%s) + 360 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            resp=$(curl -fsS \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&teamId=${ORG_ID}&target=production&limit=10")
            # Find a deployment with state=READY whose meta.githubCommitSha matches our SHA.
            match=$(echo "$resp" | jq -r --arg sha "$GITHUB_SHA" \
              '.deployments[] | select(.meta.githubCommitSha == $sha) | "\(.state)|\(.url)|\(.uid)"' | head -n1)
            if [ -n "$match" ]; then
              state=$(echo "$match" | cut -d'|' -f1)
              url=$(echo "$match" | cut -d'|' -f2)
              uid=$(echo "$match" | cut -d'|' -f3)
              echo "Vercel state: $state  url: https://$url  uid: $uid"
              if [ "$state" = "READY" ]; then
                echo "deployment_url=https://$url" >> "$GITHUB_OUTPUT"
                echo "deployment_uid=$uid" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              if [ "$state" = "ERROR" ] || [ "$state" = "CANCELED" ]; then
                echo "::error::Vercel deployment failed with state $state"
                exit 1
              fi
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for Vercel deployment to be READY"
          exit 1

      - name: Verify production alias is reachable
        env:
          # Smoke against the public production alias, not the auto-generated *.vercel.app
          # deployment URL. The latter is gated by Vercel Deployment Protection (returns 401
          # to anonymous traffic). Once wait_vercel confirms state=READY for a
          # target=production deployment, Vercel has already swung the production alias to
          # that deployment, so hitting the public URL tests the new build.
          PROD_URL: https://aeclogix.com
        run: |
          echo "Smoke target: $PROD_URL  (built from deployment ${{ steps.wait_vercel.outputs.deployment_uid }})"
          curl -fsSL -o /dev/null -w "HTTP %{http_code}\n" "$PROD_URL"

      - name: Run smoke spec against the live URL
        id: smoke
        env:
          SITE_URL: https://aeclogix.com
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Roll back production on smoke failure
        # Only fire when the smoke step specifically failed — not on infra failures
        # earlier in the job (which previously cascaded into bogus rollback attempts).
        if: steps.smoke.outcome == 'failure' && env.DISABLE_ROLLBACK != 'true'
        env:
          BAD_DEPLOYMENT_UID: ${{ steps.wait_vercel.outputs.deployment_uid }}
        run: |
          set -euo pipefail
          echo "Smoke failed. Rolling production back to the previous deployment."
          # Find the previous READY production deployment that is NOT the bad one.
          prev=$(curl -fsS \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&teamId=${ORG_ID}&target=production&state=READY&limit=10" \
            | jq -r --arg bad "$BAD_DEPLOYMENT_UID" \
              '[.deployments[] | select(.uid != $bad)] | .[0].uid')
          if [ -z "$prev" ] || [ "$prev" = "null" ]; then
            echo "::error::No previous deployment available to roll back to. Manual intervention required."
            exit 1
          fi
          echo "Promoting previous deployment $prev to production via Vercel API."
          # Use the API directly — the CLI's --scope flag wants a team slug, not the team ID,
          # which caused a "Deployment belongs to a different team" failure in an earlier run.
          # The /promote endpoint takes teamId as a query param and avoids the slug confusion.
          curl -fsS -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v10/projects/${PROJECT_ID}/promote/${prev}?teamId=${ORG_ID}" \
            -o /tmp/promote-response.json -w "HTTP %{http_code}\n"
          cat /tmp/promote-response.json
          echo "Rollback complete."

      - name: Summarize result
        if: always()
        run: |
          {
            echo "## /deploy-guard summary"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Live URL: ${{ steps.wait_vercel.outputs.deployment_url }}"
            echo "- Smoke result: ${{ steps.smoke.outcome }}"
            echo "- Rollback fired: ${{ steps.smoke.outcome == 'failure' && env.DISABLE_ROLLBACK != 'true' }}"
            echo "- DISABLE_ROLLBACK currently: ${DISABLE_ROLLBACK}"
          } >> "$GITHUB_STEP_SUMMARY"
