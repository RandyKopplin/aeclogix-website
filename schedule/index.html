<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=https://calendar.google.com/calendar/appointments/schedules/AcZssZ2vFdG2RMPYGykEpwtzvVupil8ir2G8OPGzlD8G2PTY03CzCwdbQMShgkgpmpQCp59U18257qqQ">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>AECLogix | Schedule a Meeting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0d0f;
      --surface: #111518;
      --border: #1e2428;
      --accent: #00e5c0;
      --accent-dim: rgba(0, 229, 192, 0.12);
      --text: #e8edf0;
      --muted: #5a6870;
      --mono: 'DM Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 192, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 192, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 229, 192, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 56px 64px;
      max-width: 560px;
      width: 90%;
      text-align: center;
      animation: fadeUp 0.6s ease forwards;
      opacity: 0;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 1px;
      background: var(--accent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
      display: block;
    }

    .wordmark {
      font-family: var(--display);
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
    }

    .wordmark span {
      color: var(--accent);
    }

    .tagline {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 48px;
      letter-spacing: 0.08em;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 40px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    .status-text {
      font-size: 13px;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .sub-text {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 40px;
      letter-spacing: 0.04em;
    }

    .btn {
      display: inline-block;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 32px;
      transition: background 0.2s, color 0.2s;
    }

    .btn:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .footer-note {
      margin-top: 32px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="label">Scheduling Portal</span>
    <div class="wordmark">AEC<span>Logix</span></div>
    <div class="tagline">aeclogix.com</div>
    <div class="divider"></div>
    <div class="status-row">
      <div class="dot"></div>
      <span class="status-text">Redirecting to calendar</span>
    </div>
    <div class="sub-text">You will be redirected automatically.</div>
    <a class="btn" href="https://calendar.google.com/calendar/appointments/schedules/AcZssZ2vFdG2RMPYGykEpwtzvVupil8ir2G8OPGzlD8G2PTY03CzCwdbQMShgkgpmpQCp59U18257qqQ">
      Book now
    </a>
    <div class="footer-note">If redirect fails, click the button above.</div>
  </div>
</body>
</html>
